<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Signing in…</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="loader"><div class="spinner"></div><div style="font-size:13px;color:var(--n3);margin-top:8px">Signing you in…</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/app.js"></script>
<script>
;(async () => {
  // Wait for Supabase to process the OAuth token from URL hash
  await new Promise(r => setTimeout(r, 1500))
  const user = await getUser()
  if (user) {
    const profile = await getProfile(user.id)
    if (profile) { goHome(profile.role, user.email); return }
  }
  window.location.href = '/login.html'
})()
</script>
</body>
</html>
