<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create Account — Get A Lesson</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="loader"><div class="spinner"></div></div>
<div id="toast"></div>
<div id="app" style="display:none;min-height:100vh;background:var(--w);flex-direction:column">
  <nav style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bdr)">
    <a href="/index.html" class="nav-logo">get a <em>lesson.</em></a>
    <a href="/login.html" style="font-size:12px;color:var(--n3);font-weight:600">Already have an account? Sign in</a>
  </nav>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:24px 20px">
    <div style="width:100%;max-width:360px">
      <div style="font-size:22px;font-weight:800;color:var(--n);margin-bottom:4px">Create learner account</div>
      <div style="font-size:13px;color:var(--n3);margin-bottom:22px">Free to sign up. Find and book instructors near you.</div>
      <form id="reg-form">
        <div class="form-group"><label>Full name</label><input type="text" id="name" placeholder="Your full name" required></div>
        <div class="form-group"><label>Phone number</label><input type="tel" id="phone" placeholder="+44 7700 000000" required></div>
        <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@email.com" required></div>
        <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Min 8 characters" minlength="8" required></div>
        <div class="grid-2">
          <div class="form-group"><label>Postcode</label><input type="text" id="postcode" placeholder="M1 1AA" required></div>
          <div class="form-group"><label>Test centre</label><select id="centre" required><option>Manchester City</option><option>Didsbury</option><option>Trafford</option><option>Wythenshawe</option><option>Oldham</option><option>Stockport</option></select></div>
        </div>
        <div class="grid-2">
          <div class="form-group"><label>Transmission</label><select id="trans" required><option>Manual</option><option>Automatic</option><option>No preference</option></select></div>
          <div class="form-group"><label>Gender pref.</label><select id="gend" required><option value="no_preference">No preference</option><option value="male">Male</option><option value="female">Female</option></select></div>
        </div>
        <button type="submit" class="btn btn-green" id="submit-btn">Create free account →</button>
      </form>
      <div style="text-align:center;font-size:12px;color:var(--n3);margin-top:14px">
        Want to teach? <a href="/index.html" style="color:var(--b);font-weight:600" onclick="event.preventDefault();window.location.href='/index.html';setTimeout(()=>{if(window.openInstrSignup)openInstrSignup()},800)">Apply as an instructor</a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/app.js"></script>
<script>
;(async () => {
  const user = await getUser()
  if (user) {
    const profile = await getProfile(user.id)
    if (profile) { window.location.href = '/index.html'; return }
    // Logged in but no profile — stale/broken session, sign out and let them register
    await sb.auth.signOut()
  }
  hideLoader()
  document.getElementById('app').style.display = 'flex'
  document.getElementById('app').style.flexDirection = 'column'
  document.getElementById('reg-form').addEventListener('submit', async e => {
    e.preventDefault()
    const btn = document.getElementById('submit-btn'); btn.disabled = true; btn.textContent = 'Creating account…'
    const name = document.getElementById('name').value.trim()
    const phone = document.getElementById('phone').value.trim()
    const postcode = document.getElementById('postcode').value.trim()
    const regEmail = document.getElementById('email').value.trim()
    const regPw = document.getElementById('password').value
    const regOpts = { data: { full_name: name, role: 'learner', phone, postcode, test_centre: document.getElementById('centre').value, transmission: document.getElementById('trans').value, gender_pref: document.getElementById('gend').value } }
    let { data, error } = await sb.auth.signUp({ email: regEmail, password: regPw, options: regOpts })
    if (error) {
      const alreadyExists = error.message?.toLowerCase().includes('already registered') || error.message?.toLowerCase().includes('already exists') || error.message?.toLowerCase().includes('email')
      if (alreadyExists) {
        // Sign in with same credentials to check/repair partial account
        const { data: siData, error: siErr } = await sb.auth.signInWithPassword({ email: regEmail, password: regPw })
        if (siErr) { toast('❌ This email is already registered. Please sign in or use a different email.'); btn.disabled = false; btn.textContent = 'Create free account →'; return }
        const { data: existingProf } = await sb.from('profiles').select('id').eq('id', siData.user.id).maybeSingle()
        if (existingProf) { toast('❌ You already have an account. Please sign in.'); btn.disabled = false; btn.textContent = 'Create free account →'; return }
        data = { user: siData.user }; error = null
      }
      if (error) { toast('❌ ' + error.message); btn.disabled = false; btn.textContent = 'Create free account →'; return }
    }
    if (data?.user) {
      await sb.from('profiles').upsert({ id: data.user.id, email: data.user.email, role: 'learner', full_name: name, phone, postcode, onboarding_done: true }, { onConflict: 'id' })
    }
    toast('✅ Account created!'); setTimeout(() => window.location.href = '/index.html', 1200)
  })
})()
</script>
<script src="/js/capacitor-init.js"></script>
</body>
</html>
