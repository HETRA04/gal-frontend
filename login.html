<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — Get A Lesson</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="loader"><div class="spinner"></div></div>
<div id="toast"></div>
<div id="app" style="display:none;min-height:100vh;background:var(--w);flex-direction:column">
  <nav style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bdr)">
    <a href="/index.html" class="nav-logo">get a <em>lesson.</em></a>
    <a href="/index.html" style="font-size:12px;color:var(--n3);font-weight:600">← Back</a>
  </nav>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:24px 20px">
    <div style="width:100%;max-width:360px">
      <div style="font-size:22px;font-weight:800;color:var(--n);margin-bottom:4px">Welcome back</div>
      <div style="font-size:13px;color:var(--n3);margin-bottom:22px">Sign in to your account</div>
      <div id="error-msg" style="display:none;background:#fee2e2;border:1px solid #fecaca;border-radius:8px;padding:10px 13px;font-size:13px;color:#991b1b;margin-bottom:14px"></div>
      <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@email.com"></div>
      <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Your password"></div>
      <button class="btn btn-green" id="sign-in-btn" onclick="doSignIn()">Sign in →</button>
      <div class="or-div" style="margin:14px 0"><span>or</span></div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-blue" onclick="window.location.href='/register.html'">Create a learner account →</button>
        <button class="btn btn-outline" onclick="window.location.href='/index.html'">Browse instructors first</button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/app.js"></script>
<script>
async function doSignIn() {
  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  const btn = document.getElementById('sign-in-btn')
  const errEl = document.getElementById('error-msg')

  if (!email || !password) { showError('Please enter your email and password'); return }

  btn.disabled = true
  btn.textContent = 'Signing in…'
  errEl.style.display = 'none'

  const { data, error } = await sb.auth.signInWithPassword({ email, password })

  if (error) {
    showError(error.message)
    btn.disabled = false
    btn.textContent = 'Sign in →'
    return
  }

  // Get profile and redirect
  const profile = await getProfile(data.user.id)

  if (!profile) {
    // Profile missing — create it then redirect to index
    showError('Profile not found. Please contact support or try registering again.')
    btn.disabled = false
    btn.textContent = 'Sign in →'
    return
  }

  goHome(profile.role, email)
}

function showError(msg) {
  const el = document.getElementById('error-msg')
  el.textContent = msg
  el.style.display = 'block'
}

// Allow Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn() })

;(async () => {
  const user = await getUser()
  if (user) {
    const profile = await getProfile(user.id)
    if (profile) { goHome(profile.role, user.email); return }
  }
  hideLoader()
  document.getElementById('app').style.display = 'flex'
  document.getElementById('app').style.flexDirection = 'column'
})()
</script>
</body>
</html>
